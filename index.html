<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rilith – Data & Deployment for the Robotics Era</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --rilith-primary: #6366f1;
      --rilith-surface: #020617;
      --rilith-accent: #10b981;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: #020617;
      color: #f8fafc;
    }

    .code-font { font-family: 'JetBrains Mono', monospace; }

    .hero-gradient {
      background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
    }

    .grid-pattern {
      background-image: radial-gradient(rgba(148, 163, 184, 0.1) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Modal Styling */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-active { display: flex; }
  </style>
</head>

<body class="antialiased grid-pattern">

  <nav class="py-6 border-b border-slate-800/50">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-xl">R</div>
        <span class="text-xl font-bold tracking-tight">RILITH</span>
      </div>
      <div class="hidden md:flex gap-8 text-sm font-medium text-slate-400">
        <a href="#services" class="hover:text-white transition">Services</a>
        <a href="#deployment" class="hover:text-white transition">Deployment</a>
        <a href="#" class="text-indigo-400">Documentation →</a>
      </div>
    </div>
  </nav>

  <section class="relative pt-20 pb-32 hero-gradient overflow-hidden">
    <div class="container mx-auto px-6 relative z-10 text-center">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-mono mb-6" data-aos="fade-down">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
        </span>
        Powered By Artificial Intelligence
      </div>
      
      <h1 class="text-5xl md:text-7xl font-bold mb-8 tracking-tight" data-aos="fade-up">
        Data Infrastructure for <br/>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">Autonomous Systems</span>
      </h1>
      
      <p class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto mb-10" data-aos="fade-up" data-aos-delay="100">
        We create bespoke AI applications and provide high-fidelity datasets for software and robotics.
      </p>

      <div class="flex flex-col sm:flex-row gap-4 justify-center" data-aos="fade-up" data-aos-delay="200">
        <button onclick="toggleModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-xl font-semibold transition-all shadow-lg shadow-indigo-500/20">
          Request Datasets
        </button>
        <button onclick="toggleModal()" class="bg-slate-800 hover:bg-slate-700 text-white px-8 py-4 rounded-xl font-semibold transition-all">
          Contact Us
        </button>
      </div>
    </div>
  </section>

  <div id="contactModal" class="modal-overlay">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl w-full max-w-md mx-4 relative">
      <button onclick="toggleModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white">
        <i data-feather="x"></i>
      </button>
      <h2 class="text-2xl font-bold mb-4 text-white">Get in Touch</h2>
      
      <form action="https://formspree.io/f/your-email@example.com" method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1">Name</label>
          <input type="text" name="name" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1">Email</label>
          <input type="email" name="email" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1">Message</label>
          <textarea name="message" rows="4" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500"></textarea>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg transition">
          Submit Request
        </button>
      </form>
    </div>
  </div>

  <footer class="py-12 border-t border-slate-900">
    <div class="container mx-auto px-6 text-center">
      <div class="flex justify-center gap-6 mb-8 text-slate-500">
        <i data-feather="github" class="w-5 h-5 cursor-pointer hover:text-white transition"></i>
        <i data-feather="twitter" class="w-5 h-5 cursor-pointer hover:text-white transition"></i>
        <i data-feather="linkedin" class="w-5 h-5 cursor-pointer hover:text-white transition"></i>
      </div>
      <p class="text-sm text-slate-600">© 2026 Rilith Technologies. All rights reserved.</p>
    </div>
  </footer>

  <script>
    feather.replace();
    AOS.init({ duration: 800, once: true });

    function toggleModal() {
      const modal = document.getElementById('contactModal');
      modal.classList.toggle('modal-active');
    }
  </script>
</body>
</html>
